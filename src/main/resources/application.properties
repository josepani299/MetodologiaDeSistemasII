# Puerto de la aplicación
server.port=8080
 
# Configuración de JPA y Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
 
# Configuración de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
# Nombre de la aplicación
spring.application.name=Proyecto

# -------------------------------------------------------
# n8n Webhooks (URLs que obtenés al crear cada webhook en n8n)
# -------------------------------------------------------
# Cuando n8n esté corriendo, reemplazá los paths por los
# que te asigne n8n al crear los nodos Webhook.
# Por defecto n8n escucha en puerto 5678.
n8n.webhook.confirmacion=http://localhost:5678/webhook/pedido-confirmacion
n8n.webhook.cambio-estado=http://localhost:5678/webhook/pedido-cambio-estado