# Puerto de la aplicación
server.port=8080
 
# Configuración de JPA y Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
 
# Configuración de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
# Nombre de la aplicación
spring.application.name=Proyecto

# ── US16 - Asistente de Reposición Inteligente ───────────────────────────────

# URL del webhook n8n (ajustar el path al que genere n8n al crear el nodo Webhook)
n8n.webhook.stock-critico=http://localhost:5678/webhook/stock-critico

# Mock activo mientras US14 no esté mergeada.
# Cuando US14 se mergee a develop, cambiar a false (o eliminar la línea).
features.stock-critico.mock=true

# WebClient necesita spring-boot-starter-webflux en el pom.xml
# Si ya tenés spring-boot-starter-web, agregá solo webflux (coexisten sin problema)